<!DOCTYPE html>
<html>

<head>
    <title>Practice | Instagram Follow-request layout</title>
    <link rel="stylesheet" href="../../CSS/Practice_CSS/8a.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="insta-request">
        <div class="insta-pfp">
            <img class="pfp-img" src="../../Images/Practices-Images/neko-pussy.jpg">
        </div>
        <div class="insta-info">
            <div class="user-name">
                Oliver
            </div>
            <div class="user-id">
                the cat
            </div>
            <div class="pfp-status">
                Popular
            </div>
        </div>
        <div class="insta-button">
            <button class="follow-button">
                Follow
            </button>
        </div>
    </div>

    <div class="insta-request">
        <div class="insta-pfp">
            <img class="pfp-img" src="../../Images/Practices-Images/bunny.jpg">
        </div>
        <div class="insta-info">
            <div class="user-name">
                Mimi
            </div>
            <div class="user-id">
                the bunny
            </div>
            <div class="pfp-status">
                Popular
            </div>
        </div>
        <div class="insta-button">
            <button class="follow-button">
                Follow
            </button>
        </div>
    </div>

    <div class="insta-request">
        <div class="insta-pfp">
            <img class="pfp-img" src="../../Images/Practices-Images/harry.jpg">
        </div>
        <div class="insta-info">
            <div class="user-name">
                Rex
            </div>
            <div class="user-id">
                Happy Golden Retriever
            </div>
            <div class="pfp-status">
                Popular
            </div>
        </div>
        <div class="insta-button">
            <button class="follow-button">
                Follow
            </button>
        </div>
    </div>
</body>

</html>
