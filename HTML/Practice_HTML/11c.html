<!DOCTYPE html>
<html>

<head>
    <title>Practice | Twitter Design</title>
    <link rel="stylesheet" href="../../CSS/Practice_CSS/11c.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container-flex">

        <div class="tweet-pfp">
            <img class="pfp" src="../../Images/Practices-Images/neko-pussy.jpg" alt="">
        </div>

        <div class="tweet-info">

            <div class="tweet-description-flex">

                <div class="tweet-auth">
                    supersimple.dev
                </div>

                <div class="tweet-handle">
                    &#64;SuperSimpleDev
                </div>

            </div>

            <div class="quote">
                What is backend web development? A complete
                overview. New video is up&#33;
            </div>

            <div class="tweet-reference-flex">

                <div class="box">

                </div>

                <div class="tweet-ref-yt">

                    <div class="yt-link">
                        youtube.com
                    </div>
                    <div class="yt-description">
                        Backend web development &#45; a
                        complete overview &#40;2021&#41;
                    </div>

                </div>

            </div>

        </div>

    </div>
</body>

</html>
