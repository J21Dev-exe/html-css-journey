<!DOCTYPE html>
<html>

<head>
    <title>Practice | Gmail mail-box Layout</title>
    <link rel="stylesheet" href="../../CSS/Practice_CSS/11b.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="mail-container">

        <div class="header">
            ALL INBOXES
        </div>

        <div class="mail-profile-flex">

            <div class="mail-profile-picture">
                <img class="profile-pic" src="../../Images/Practices-Images/neko-pussy.jpg" alt="">
            </div>

            <div class="mail-profile-info">

                <div class="mail-info-bar-flex">

                    <div class="mail-username">
                        Chewy Promotions
                    </div>

                    <div class="mail-time">
                        4:58 PM
                    </div>

                </div>

                <div class="mail-about">
                    Biggest sales of the year!
                </div>
                <div class="mail-description">
                    Hey there! We're writing to tell you about our...
                </div>
            </div>

        </div>

    </div>
</body>

</html>
