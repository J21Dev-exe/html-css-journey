<!DOCTYPE html>
<html>

<head>
    <title>Practice | Amazon Product Layout</title>
    <link rel="stylesheet" href="../../CSS/Practice_CSS/1e.css">
</head>

<body>
    <a href="https://www.amazon.com/" target="_blank" class="amazon-link">
        Back to Amazon
    </a>

    <h1>
        Nike Black Running Shoes
    </h1>

    <p class="amazon-price">
        $39 - in stock
    </p>

    <p class="amazon-delivery">
        Free delivery tomorrow.
    </p>

    <button class="amazon-button1">
        Add to cart
    </button>

    <button class="amazon-button2">
        Buy now
    </button>
</body>

</html>
